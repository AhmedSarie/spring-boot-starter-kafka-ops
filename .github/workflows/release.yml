name: Release to Maven Central

on:
  push:
    branches: [ main ]

jobs:
  release:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Build and test
        run: ./mvnw verify --batch-mode

      - name: Extract version from pom.xml
        id: version
        run: |
          VERSION=$(./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout --batch-mode)
          RELEASE_VERSION=${VERSION%-SNAPSHOT}
          echo "release=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"

          # Calculate next patch version
          MAJOR=$(echo "$RELEASE_VERSION" | cut -d. -f1)
          MINOR=$(echo "$RELEASE_VERSION" | cut -d. -f2)
          PATCH=$(echo "$RELEASE_VERSION" | cut -d. -f3)
          NEXT_PATCH=$((PATCH + 1))
          echo "next=${MAJOR}.${MINOR}.${NEXT_PATCH}-SNAPSHOT" >> "$GITHUB_OUTPUT"

      - name: Set release version
        run: ./mvnw versions:set -DnewVersion=${{ steps.version.outputs.release }} --batch-mode

      - name: Sign and publish to Maven Central
        run: ./mvnw deploy -P release --batch-mode -DskipTests
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Tag release
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag "v${{ steps.version.outputs.release }}"
          git push origin "v${{ steps.version.outputs.release }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.release }}
          generate_release_notes: true
          files: target/*.jar

      - name: Bump to next snapshot version
        run: |
          git checkout main
          ./mvnw versions:set -DnewVersion=${{ steps.version.outputs.next }} --batch-mode
          git add pom.xml
          git commit -m "Bump version to ${{ steps.version.outputs.next }} [skip ci]"
          git push origin main
